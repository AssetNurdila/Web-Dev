<div *ngIf="loading">Loading...</div>

<div *ngIf="!loading">
  <h2>Album #{{ album.id }}</h2>
  <p>User ID: {{ album.userId }}</p>

  <input [(ngModel)]="album.title" />
  <button (click)="save()">Save</button>

  <button [routerLink]="['/albums', album.id, 'photos']">
    View Photos
  </button>

  <button (click)="back()">Back</button>
</div>
